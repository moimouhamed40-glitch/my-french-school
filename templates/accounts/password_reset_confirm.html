{% extends 'base_dashboard.html' %}
{% load static %}

{% block title %}Nouveau mot de passe{% endblock %}
{% block breadcrumb %}Nouveau mot de passe{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4">
                <h3 class="text-center mb-4">🔐 Nouveau mot de passe</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label-dark">Nouveau mot de passe</label>
                        <input type="password" name="new_password1" class="form-control-dark" placeholder="••••••••" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-dark">Confirmer le mot de passe</label>
                        <input type="password" name="new_password2" class="form-control-dark" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary-gradient w-100">
                        <i class="fa-solid fa-key me-2"></i> Changer le mot de passe
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
